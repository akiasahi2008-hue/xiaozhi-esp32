name: Build AtomS3R Only

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build AtomS3R
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AtomS3R variant
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py atoms3r-echo-base --name atoms3r-echo-base

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_atoms3r-echo-base_${{ github.sha }}
          path: build/merged-binary.bin
          if-no-files-found: error
